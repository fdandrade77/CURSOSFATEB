<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FATEB - Instituto de Formação Acadêmica</title>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" errors
      try {
        let activeFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() { return activeFetch; },
          set(val) { activeFetch = val; },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn('Could not redefine window.fetch property:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
